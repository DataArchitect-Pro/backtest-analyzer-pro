name: Streamlit Keep Alive (High Intensity)

on:
  schedule:
    - cron: '0 */2 * * *' # 念のため2時間おきに頻度を上げます
  workflow_dispatch:

jobs:
  ping_apps:
    runs-on: ubuntu-latest
    steps:
      - name: Send Deep Ping to Streamlit Apps
        run: |
          # Chromeブラウザを装い、リダイレクトを追跡してフルアクセス
          USER_AGENT="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          
          curl -L -A "$USER_AGENT" https://v6wu9cbfdrhfvtpm3kd7ac.streamlit.app/
          curl -L -A "$USER_AGENT" https://mainpy-gswk7qchfnqq2djpgbenut.streamlit.app/
          curl -L -A "$USER_AGENT" https://nvzx2zetvrdgek9dhony4b.streamlit.app/
