name: Streamlit Ultra Keep Alive

on:
  schedule:
    - cron: '0 */2 * * *' # 2時間ごとに実行（頻度を上げます）
  workflow_dispatch:

jobs:
  keep_alive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Force Wake Up Apps
        run: |
          python - <<EOF
          from playwright.sync_api import sync_playwright
          import time

          urls = [
              "https://v6wu9cbfdrhfvtpm3kd7ac.streamlit.app/",
              "https://mainpy-gswk7qchfnqq2djpgbenut.streamlit.app/",
              "https://nvzx2zetvrdgek9dhony4b.streamlit.app/"
          ]

          with sync_playwright() as p:
              # 人間に見せかけるための設定
              browser = p.chromium.launch(headless=True)
              context = browser.new_context(
                  user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  viewport={'width': 1280, 'height': 800}
              )

              for url in urls:
                  print(f"--- Accessing: {url} ---")
                  page = context.new_page()
                  try:
                      # タイムアウトを長めに設定（30秒）
                      page.goto(url, wait_until="networkidle", timeout=60000)
                      time.sleep(10) # 読み込み待ち

                      # 「Yes, wake it up」ボタンがあるか探す
                      # Streamlitの仕様変更に対応するため、テキストベースで検索
                      wake_up_button = page.get_by_text("Yes, wake it up")
                      
                      if wake_up_button.is_visible():
                          print(f"Status: Sleeping. Clicking 'Wake up' button...")
                          wake_up_button.click()
                          # 起動するまでしばらく待機
                          page.wait_for_load_state("networkidle")
                          time.sleep(20) 
                          print(f"Success: App is waking up.")
                      else:
                          print(f"Status: Already Awake.")
                          
                  except Exception as e:
                      print(f"Error accessing {url}: {e}")
                  finally:
                      page.close()
              
              browser.close()
          EOF
